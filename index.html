<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background: #35424a;
            color: #ffffff;
            padding: 10px 0;
            text-align: center;
        }

        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }

        .products {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin: 20px 0;
        }

        .product {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            flex: 1 1 30%;
            margin: 10px;
            padding: 10px;
            text-align: center;
        }

        .cart {
            border: 1px solid #ccc;
            padding: 10px;
            background: #fff;
        }

        footer {
            background: #35424a;
            color: #ffffff;
            text-align: center;
            padding: 10px 0;
            position: relative;
            bottom: 0;
            width: 100%;
        }

        button {
            background: #e8491d;
            color: #ffffff;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <header>
        <h1>E-Store</h1>
        <p>Your one-stop shop for everything!</p>
    </header>

    <div class="container">
        <h2>Products</h2>
        <div class="products">
            <div class="product">
                <h3>Product 1</h3>
                <p>$10.00</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <h3>Product 2</h3>
                <p>$20.00</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <h3>Product 3</h3>
                <p>$30.00</p>
                <button>Add to Cart</button>
            </div>
        </div>

        <div class="cart">
            <h2>Shopping Cart</h2>
            <p>Your cart is currently empty.</p>
        </div>
    </div>

    <footer>
        <p>Copyright &copy; 2026 E-Store</p>
    </footer>
</body>

</html>
